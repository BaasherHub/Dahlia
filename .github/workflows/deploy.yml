name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package.json
            backend/package.json

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Lint backend
        run: cd backend && npm run lint

      - name: Lint frontend
        run: cd frontend && npm run lint

      - name: Test backend
        run: cd backend && npm test

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://placeholder.railway.app"
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: "placeholder"
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: "dahlia"

      - name: Prisma generate (verify schema)
        run: cd backend && npx prisma generate

      - name: All checks passed
        run: echo "Linting, testing, and building successful — Railway will deploy automatically"
