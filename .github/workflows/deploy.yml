name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  # Railway auto-deploys from GitHub — this workflow just runs checks first
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package.json
            backend/package.json

      - name: Install backend deps
        run: cd backend && npm install

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Build frontend (verify it compiles)
        run: cd frontend && npm run build
        env:
          VITE_API_URL: "https://placeholder.railway.app"

      - name: Prisma generate (verify schema)
        run: cd backend && npx prisma generate

      - name: Success
        run: echo "✅ All checks passed — Railway will deploy automatically"
